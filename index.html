    <!-- ── rotating site logo ── -->
    <div class="site-logo-wrap">
        <img class="site-logo" src="resources/transparent.png" alt="Site Logo">
    </div>

    <div class="ui">
        <div class="orn">
            <div class="orn-line"></div>
            <div class="orn-gem"></div>
            <div class="orn-line"></div>
        </div>

        <div class="title-wrap" id="titleWrap">
            <div class="lc" data-letter="ය" data-morse="-.-- .-">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">h</div>
            </div>
            <div class="lc" data-letter="ද" data-morse="-.. .-">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">o</div>
            </div>
            <div class="lc" data-letter="ම" data-morse="-- .-">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">u</div>
            </div>
            <div class="lc" data-letter="ක" data-morse="-.- .-">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">l</div>
            </div>

            <div class="word-gap"></div>

            <div class="lc" data-letter="අ" data-morse=".-">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">w</div>
            </div>
            <div class="lc" data-letter="භි" data-morse="-... ..">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">Ns</div>
            </div>
            <div class="lc" data-letter="ම" data-morse="-- .-">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">u</div>
            </div>
            <div class="lc" data-letter="න්" data-morse="-.">
                <div class="morse-layer"></div>
                <div class="scramble-layer"></div>
                <div class="ltr">ka</div>
            </div>
        </div>

        <div class="orn">
            <div class="orn-line"></div>
            <div class="orn-gem"></div>
            <div class="orn-line"></div>
        </div>

        <div class="tagline-wrap">
            <div class="crt-scanline" id="crtScanline"></div>
            <p class="tagline" id="tagline">
                <span class="tagline-year" id="taglineYear"></span><span class="crt-cursor" id="crtCursor"></span>
            </p>
        </div>

        <!-- ── Countdown Timer ── -->
        <div class="countdown-wrap" id="countdownWrap">
            <div class="countdown-event-date" id="countdownDate">2026 · MAR · 27 · 7:00 PM</div>
            <div class="countdown-boxes">
                <div class="countdown-box">
                    <span class="cd-num" id="cdDays">00</span>
                    <span class="cd-label">DAYS</span>
                </div>
                <div class="countdown-sep">:</div>
                <div class="countdown-box">
                    <span class="cd-num" id="cdHours">00</span>
                    <span class="cd-label">HOURS</span>
                </div>
                <div class="countdown-sep">:</div>
                <div class="countdown-box">
                    <span class="cd-num" id="cdMins">00</span>
                    <span class="cd-label">MINUTES</span>
                </div>
                <div class="countdown-sep">:</div>
                <div class="countdown-box">
                    <span class="cd-num" id="cdSecs">00</span>
                    <span class="cd-label">SECONDS</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
